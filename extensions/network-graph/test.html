<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Network Graph — Browser Test</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f5f5f5; padding: 16px; }
    h2 { font-size: 14px; color: #333; margin-bottom: 10px; }
    #chart-wrapper { width: 100%; height: calc(100vh - 80px); background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
    #chart { width: 100%; height: 100%; position: relative; }
    .tooltip { position: absolute; background: rgba(255,255,255,0.96); border: 1px solid #ddd; border-radius: 6px; padding: 9px 13px; font-size: 12px; line-height: 1.7; pointer-events: none; box-shadow: 0 3px 10px rgba(0,0,0,0.10); max-width: 220px; display: none; }
    .tooltip .tt-title { font-weight: 600; font-size: 13px; color: #222; margin-bottom: 4px; }
    #error { display: none; background: #fff0f0; color: #c0392b; padding: 8px 16px; border-radius: 6px; margin-bottom: 8px; }
    #error:not(:empty) { display: block; }
    #toolbar { display: flex; align-items: center; gap: 12px; padding: 6px 12px; background: #f8f8f8; border-bottom: 1px solid #e0e0e0; font-size: 12px; flex-wrap: wrap; }
    #toolbar label { color: #555; white-space: nowrap; }
    #toolbar input[type="range"] { width: 100px; cursor: pointer; }
    #thresholdVal { font-weight: 600; color: #4e79a7; min-width: 28px; display: inline-block; }
    #toolbar .sep { width: 1px; height: 18px; background: #ddd; }
    .toggle-btn { padding: 3px 9px; border: 1px solid #ccc; border-radius: 3px; background: #fff; font-size: 11px; cursor: pointer; color: #444; }
    .toggle-btn.active { background: #4e79a7; color: #fff; border-color: #4e79a7; }
  </style>
</head>
<body>
  <h2>Network Graph — Browser Test (Mock: 8 Café Products, 16 Co-Purchase Edges)</h2>
  <div id="chart-wrapper">
    <div id="toolbar">
      <label>Threshold: <input type="range" id="threshold" min="0" max="100" value="25">
        <span id="thresholdVal">25%</span>
      </label>
      <div class="sep"></div>
      <button class="toggle-btn active" id="btnLabels">Node Labels</button>
      <button class="toggle-btn" id="btnFreeze">Freeze</button>
      <div class="sep"></div>
      <span style="color:#888; font-size:11px;">Drag nodes to pin</span>
    </div>
    <div id="chart"></div>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <div id="error"></div>

  <script>
    // ─── Mock Tableau API ─────────────────────────────────────────────────────
    // Columns: source, target, weight (lift), node_size (total purchases)
    const MOCK_COLUMNS = [
      { fieldName: 'Source Product', index: 0 },
      { fieldName: 'Target Product', index: 1 },
      { fieldName: 'Lift Score',     index: 2 },
      { fieldName: 'Total Purchases',index: 3 },
    ];

    // 8 products: Espresso, Latte, Muffin, Croissant, Sandwich, Tea, Juice, Smoothie
    // 16 edges with realistic lift scores (0.8–3.2)
    // Clusters: Coffee drinks cluster (Espresso/Latte), Pastry cluster (Muffin/Croissant), Food cluster (Sandwich)
    const MOCK_DATA = [
      // Coffee cluster
      ['Espresso',   'Latte',      3.2, 5200],
      ['Espresso',   'Muffin',     2.1, 5200],
      ['Latte',      'Croissant',  2.8, 4100],
      ['Latte',      'Muffin',     2.4, 4100],
      // Pastry cluster
      ['Muffin',     'Croissant',  3.0, 3800],
      ['Muffin',     'Juice',      1.6, 3800],
      ['Croissant',  'Tea',        1.8, 2900],
      ['Croissant',  'Sandwich',   1.3, 2900],
      // Food cluster
      ['Sandwich',   'Juice',      2.2, 2400],
      ['Sandwich',   'Tea',        1.5, 2400],
      // Cross-cluster weak links
      ['Espresso',   'Croissant',  1.4, 5200],
      ['Tea',        'Muffin',     1.2, 1800],
      ['Juice',      'Smoothie',   2.6, 1600],
      ['Smoothie',   'Latte',      1.1, 1400],
      ['Tea',        'Smoothie',   0.9, 1800],
      ['Espresso',   'Sandwich',   0.8, 5200],
    ].map(r => r.map(v => ({ value: v })));

    const MOCK_ENCODINGS = [
      { id: 'source',    fieldCollection: [{ fieldName: 'Source Product' }] },
      { id: 'target',    fieldCollection: [{ fieldName: 'Target Product' }] },
      { id: 'weight',    fieldCollection: [{ fieldName: 'Lift Score' }] },
      { id: 'node_size', fieldCollection: [{ fieldName: 'Total Purchases' }] },
    ];

    window.tableau = {
      extensions: {
        initializeAsync() { return Promise.resolve(); },
        worksheetContent: {
          worksheet: {
            addEventListener() {},
            getVisualSpecificationAsync() {
              return Promise.resolve({
                marksSpecificationCollection: [{ encodingCollection: MOCK_ENCODINGS }]
              });
            },
            getSummaryDataReaderAsync() {
              return Promise.resolve({
                getAllPagesAsync() {
                  return Promise.resolve({ columns: MOCK_COLUMNS, data: MOCK_DATA });
                },
                releaseAsync() { return Promise.resolve(); }
              });
            }
          }
        }
      },
      TableauEventType: { SummaryDataChanged: 'SummaryDataChanged' }
    };
  </script>
  <script src="chart.js"></script>
</body>
</html>
