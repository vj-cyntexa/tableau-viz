<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KPI Card</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api@v1.16.0/lib/tableau.extensions.1.latest.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
    }

    #card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 28px 32px;
      width: min(340px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .card-label {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      width: 100%;
    }

    .card-value {
      font-size: 42px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.1;
      width: 100%;
    }

    .card-comparison {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      color: #555;
      width: 100%;
    }

    .card-delta {
      font-weight: 600;
      font-size: 15px;
    }
    .card-delta.positive { color: #27ae60; }
    .card-delta.negative { color: #e74c3c; }
    .card-delta.neutral  { color: #3498db; }

    .card-trend-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    .card-trend-badge.up   { background: #eafaf1; color: #27ae60; }
    .card-trend-badge.down { background: #fdf0ef; color: #e74c3c; }

    .card-sparkline {
      width: 100%;
      margin-top: 4px;
    }

    /* ── Hint text (shown when optional encoding is missing) ────────────── */
    .card-hint {
      font-size: 11px;
      color: #b0b8c1;
      font-style: italic;
      width: 100%;
    }

    #mode-bar {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 4px;
      z-index: 10;
    }
    .mode-btn {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      color: #555;
    }
    .mode-btn.active {
      background: #3498db;
      color: #fff;
      border-color: #3498db;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
    }
    #error:not(:empty) { display: block; }
  </style>
</head>
<body>
  <div id="mode-bar">
    <button class="mode-btn active" data-mode="simple">Simple</button>
    <button class="mode-btn" data-mode="comparison">Comparison</button>
    <button class="mode-btn" data-mode="trend">Trend</button>
    <button class="mode-btn" data-mode="sparkline">Sparkline</button>
  </div>
  <div id="card"></div>
  <div id="error"></div>
  <script src="chart.js"></script>
</body>
</html>
