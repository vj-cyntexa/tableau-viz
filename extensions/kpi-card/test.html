<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>KPI Card — Browser Test</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #eef0f3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px;
    }
    h2 {
      font-size: 13px;
      color: #7a828e;
      margin-bottom: 24px;
      font-weight: 500;
    }

    /* ── Styles matching chart.js class names ─────────────────────────── */
    #card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 28px 32px;
      width: min(340px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    #mode-bar {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 4px;
      z-index: 10;
    }
    .mode-btn {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      color: #555;
    }
    .mode-btn.active {
      background: #3498db;
      color: #fff;
      border-color: #3498db;
    }

    .card-label {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      width: 100%;
    }

    .card-value {
      font-size: 42px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.1;
      width: 100%;
    }

    .card-comparison {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      color: #555;
      width: 100%;
    }

    .card-delta {
      font-weight: 600;
      font-size: 15px;
    }
    .card-delta.positive { color: #27ae60; }
    .card-delta.negative { color: #e74c3c; }
    .card-delta.neutral  { color: #3498db; }

    .card-trend-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    .card-trend-badge.up   { background: #eafaf1; color: #27ae60; }
    .card-trend-badge.down { background: #fdf0ef; color: #e74c3c; }

    .card-sparkline {
      width: 100%;
      margin-top: 4px;
    }

    .card-hint { margin-top: 10px; font-size: 11px; color: #b0b8c1; font-style: italic; }
    #error { display: none; }
    #error:not(:empty) {
      display: block;
      margin-top: 12px;
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 12px;
      max-width: 420px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>KPI Card — Browser Test (no Tableau required)</h2>

  <div id="card">
    <div id="mode-bar">
      <button class="mode-btn active" data-mode="simple">Simple</button>
      <button class="mode-btn" data-mode="comparison">Comparison</button>
      <button class="mode-btn" data-mode="trend">Trend</button>
      <button class="mode-btn" data-mode="sparkline">Sparkline</button>
    </div>
  </div>
  <div id="error"></div>

  <script>
  // ─── Mock Tableau Extensions API ────────────────────────────────────────────
  // Data: 12-month revenue history, current = Dec (1,200,000), prev = Dec prior year (1,050,000)
  (function buildMock() {
    // Monthly revenue figures — 12 months of current year (Jan–Dec)
    const currentYearRevenue = [
      880000, 910000, 945000, 975000, 1020000, 990000,
      1050000, 1080000, 1100000, 1130000, 1165000, 1200000,
    ];

    // Corresponding comparison (previous-year same-month) values
    const prevYearRevenue = [
      760000, 790000, 820000, 840000, 870000, 855000,
      895000, 920000, 940000, 970000, 1010000, 1050000,
    ];

    const rows = currentYearRevenue.map((rev, i) => {
      const d = new Date(2024, i, 1);
      const dateStr = d.toISOString().split('T')[0];
      return [
        { value: 'Total Revenue' },      // label col 0
        { value: String(rev) },          // value col 1
        { value: String(prevYearRevenue[i]) }, // comparison col 2
        { value: String(rev) },          // history col 3 (same measure as value here)
        { value: dateStr },              // date col 4
      ];
    });

    window.tableau = {
      TableauEventType: { SummaryDataChanged: 'summary-data-changed' },
      extensions: {
        initializeAsync: async () => {},
        worksheetContent: {
          worksheet: {
            addEventListener: () => {},
            getVisualSpecificationAsync: async () => ({
              marksSpecificationCollection: [{
                encodingCollection: [
                  { id: 'value',      fieldCollection: [{ fieldName: 'Revenue' }] },
                  { id: 'label',      fieldCollection: [{ fieldName: 'Metric Name' }] },
                  { id: 'comparison', fieldCollection: [{ fieldName: 'Prev Revenue' }] },
                  { id: 'history',    fieldCollection: [{ fieldName: 'Revenue History' }] },
                  { id: 'date',       fieldCollection: [{ fieldName: 'Month' }] },
                ],
              }],
            }),
            getSummaryDataReaderAsync: async () => ({
              getAllPagesAsync: async () => ({
                columns: [
                  { fieldName: 'Metric Name',      index: 0, dataType: 'string' },
                  { fieldName: 'Revenue',          index: 1, dataType: 'float'  },
                  { fieldName: 'Prev Revenue',     index: 2, dataType: 'float'  },
                  { fieldName: 'Revenue History',  index: 3, dataType: 'float'  },
                  { fieldName: 'Month',            index: 4, dataType: 'date'   },
                ],
                data: rows,
              }),
              releaseAsync: async () => {},
            }),
          },
        },
      },
    };
  }());
  </script>

  <!-- Load chart logic after mock is defined -->
  <script src="chart.js"></script>
</body>
</html>
