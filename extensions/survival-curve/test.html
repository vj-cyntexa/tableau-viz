<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Survival / Churn Curve — Browser Test</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    h2 { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 12px; }
    #toolbar {
      display: flex; align-items: center; gap: 12px; padding: 6px 12px;
      background: #f8f8f8; border: 1px solid #e0e0e0; border-bottom: none;
      border-radius: 8px 8px 0 0; flex-wrap: wrap;
    }
    #toolbar .toolbar-group { display: flex; align-items: center; gap: 4px; }
    #toolbar label { font-size: 11px; color: #555; font-weight: 600; text-transform: uppercase; margin-right: 4px; }
    #toolbar button {
      font-size: 11px; padding: 3px 9px; border: 1px solid #ccc;
      border-radius: 4px; background: #fff; color: #333; cursor: pointer;
    }
    #toolbar button.active { background: #4e79a7; color: #fff; border-color: #4e79a7; }
    #toolbar .sep { width: 1px; height: 20px; background: #ddd; margin: 0 4px; }
    #chart-wrapper {
      width: 100%; height: calc(100vh - 120px);
      background: #fff; border: 1px solid #ddd; border-radius: 0 0 8px 8px;
      overflow: hidden; position: relative;
    }
    #chart { width: 100%; height: 100%; position: relative; }
    #error {
      display: none; position: fixed; bottom: 10px; left: 50%;
      transform: translateX(-50%); background: #fff0f0; color: #c0392b;
      border: 1px solid #f5c6c6; border-radius: 6px; padding: 8px 16px;
      font-size: 13px; z-index: 100; max-width: 80vw; text-align: center;
    }
    #error:not(:empty) { display: block; }
    .series-line { fill: none; stroke-width: 2.5px; }
    .ci-band { stroke: none; }
    .median-line { stroke-dasharray: 5 4; stroke-width: 1.5; }
    .fifty-line { stroke: #bbb; stroke-dasharray: 4 3; stroke-width: 1; }
    .grid line { stroke: #ebebeb; stroke-dasharray: 3 3; }
    .grid .domain { display: none; }
    .axis text { font-size: 11px; fill: #555; }
    .axis .domain { stroke: #ccc; }
    .axis .tick line { stroke: #ccc; }
    .legend text { font-size: 12px; fill: #444; }
    .dot { r: 4; }
    .tooltip {
      position: absolute; background: rgba(255,255,255,0.96);
      border: 1px solid #ddd; border-radius: 6px; padding: 9px 13px;
      font-size: 12px; line-height: 1.7; pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.10); max-width: 260px; z-index: 50;
    }
    .tooltip .tt-title { font-weight: 600; font-size: 13px; color: #222; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h2>Survival / Churn Curve — Browser Test (no Tableau required)</h2>
  <div id="toolbar">
    <div class="toolbar-group">
      <label>CI Bands</label>
      <button id="btn-ci" class="active">Show</button>
    </div>
    <div class="sep"></div>
    <div class="toolbar-group">
      <label>Curve style</label>
      <button class="curve-btn active" data-curve="smooth">Smooth</button>
      <button class="curve-btn" data-curve="step">Step (KM)</button>
    </div>
    <div class="sep"></div>
    <div class="toolbar-group">
      <label>Median Marker</label>
      <button id="btn-median" class="active">Show</button>
    </div>
  </div>
  <div id="chart-wrapper">
    <div id="chart"></div>
    <div id="error"></div>
  </div>
  <script>
    // 3 loyalty segments over 24 months
    // Gold: reaches 50% at month 18 (best retention)
    // Silver: reaches 50% at month 12
    // Bronze: reaches 50% at month 8 (worst retention)
    // CI bands included for all 3 segments

    function buildSurvivalCurve(monthlyDropRate, totalMonths) {
      // Exponential-like decay with accelerating early churn
      // S(0) = 1.0, then drops by monthlyDropRate each period
      const curve = [];
      let s = 1.0;
      for (let m = 0; m <= totalMonths; m++) {
        curve.push(parseFloat(s.toFixed(4)));
        // Drop rate decreases over time (fast initial churn, slow later)
        const drop = monthlyDropRate * Math.exp(-m * 0.08);
        s = Math.max(0, s - drop);
      }
      return curve;
    }

    // Tuned so medians hit approximately months 18, 12, 8
    const goldCurve   = buildSurvivalCurve(0.025, 24); // slow decay
    const silverCurve = buildSurvivalCurve(0.048, 24); // medium decay
    const bronzeCurve = buildSurvivalCurve(0.075, 24); // fast decay

    function buildRows(segmentName, survivalValues, ciWidth) {
      return survivalValues.map((s, month) => ({
        month,
        segment: segmentName,
        survival: s,
        ciLower: Math.max(0, s - ciWidth),
        ciUpper: Math.min(1, s + ciWidth),
      }));
    }

    const allRows = [
      ...buildRows('Gold',   goldCurve,   0.03),
      ...buildRows('Silver', silverCurve, 0.04),
      ...buildRows('Bronze', bronzeCurve, 0.05),
    ];

    const columns = [
      { fieldName: 'Month',    index: 0, dataType: 'float'  },
      { fieldName: 'Survival', index: 1, dataType: 'float'  },
      { fieldName: 'Segment',  index: 2, dataType: 'string' },
      { fieldName: 'CI Lower', index: 3, dataType: 'float'  },
      { fieldName: 'CI Upper', index: 4, dataType: 'float'  },
    ];

    const rows = allRows.map(r => [
      { value: String(r.month)    },
      { value: String(r.survival) },
      { value: r.segment          },
      { value: String(r.ciLower)  },
      { value: String(r.ciUpper)  },
    ]);

    const dataTable = { columns, data: rows };
    const vizSpec = {
      marksSpecificationCollection: [{
        encodingCollection: [
          { id: 'period',   fieldCollection: [{ fieldName: 'Month'    }] },
          { id: 'survival', fieldCollection: [{ fieldName: 'Survival' }] },
          { id: 'segment',  fieldCollection: [{ fieldName: 'Segment'  }] },
          { id: 'ci_lower', fieldCollection: [{ fieldName: 'CI Lower' }] },
          { id: 'ci_upper', fieldCollection: [{ fieldName: 'CI Upper' }] },
        ],
      }],
    };

    window.tableau = {
      TableauEventType: { SummaryDataChanged: 'summary-data-changed' },
      extensions: {
        initializeAsync() { return Promise.resolve(); },
        worksheetContent: {
          worksheet: {
            addEventListener() {},
            getVisualSpecificationAsync() { return Promise.resolve(vizSpec); },
            getSummaryDataReaderAsync() {
              return Promise.resolve({
                getAllPagesAsync() { return Promise.resolve(dataTable); },
                releaseAsync()    { return Promise.resolve(); },
              });
            },
          },
        },
      },
    };
  </script>
  <script src="chart.js"></script>
  <script>
    document.getElementById('btn-ci').addEventListener('click', function () {
      window.SURV_STATE.showCI = !window.SURV_STATE.showCI;
      this.textContent = window.SURV_STATE.showCI ? 'Show' : 'Hide';
      this.classList.toggle('active', window.SURV_STATE.showCI);
      window.SURV_STATE.redraw();
    });
    document.querySelectorAll('.curve-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.curve-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.SURV_STATE.curveStyle = btn.dataset.curve;
        window.SURV_STATE.redraw();
      });
    });
    document.getElementById('btn-median').addEventListener('click', function () {
      window.SURV_STATE.showMedian = !window.SURV_STATE.showMedian;
      this.textContent = window.SURV_STATE.showMedian ? 'Show' : 'Hide';
      this.classList.toggle('active', window.SURV_STATE.showMedian);
      window.SURV_STATE.redraw();
    });
  </script>
</body>
</html>
