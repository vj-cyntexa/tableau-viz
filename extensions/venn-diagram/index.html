<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Venn Diagram</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/venn.js@0.2.20/build/venn.js"></script>
  <script src="https://extensions.tableau.com/lib/tableau.extensions.2.latest.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 18px;
      padding: 8px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e0e0e0;
      min-height: 44px;
      flex-shrink: 0;
    }

    #toolbar:empty { display: none; }

    #toolbar label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      white-space: nowrap;
    }

    #toolbar input[type="color"] {
      width: 26px;
      height: 26px;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 1px;
      cursor: pointer;
      background: none;
    }

    #panels {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      padding: 16px;
      overflow-y: auto;
      align-content: start;
    }

    .venn-panel {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      min-height: 360px;
      overflow: hidden;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      padding: 10px 14px 0 14px;
      flex-shrink: 0;
      letter-spacing: 0.01em;
    }

    .panel-title:empty { display: none; }

    .panel-chart {
      flex: 1;
      position: relative;
      min-height: 300px;
    }

    .panel-chart svg .venn-circle path {
      fill-opacity: 0.22;
      stroke-width: 2.5;
    }

    .panel-chart svg .venn-circle path:hover,
    .panel-chart svg .venn-circle.hover path {
      fill-opacity: 0.42;
      cursor: pointer;
    }

    .panel-chart svg .venn-intersection path { fill-opacity: 0; }

    .panel-chart svg .venn-intersection path:hover,
    .panel-chart svg .venn-intersection.hover path {
      fill-opacity: 0.18;
      cursor: pointer;
    }

    .panel-chart svg .venn-label-name {
      font-size: 15px;
      font-weight: 700;
      fill: #222;
      pointer-events: none;
    }

    .panel-chart svg .venn-label-count {
      font-size: 13px;
      fill: #555;
      pointer-events: none;
    }

    .tooltip {
      position: fixed;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 13px;
      line-height: 1.6;
      pointer-events: none;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
      max-width: 240px;
      display: none;
      z-index: 999;
    }

    .tooltip .tt-title {
      font-weight: 600;
      font-size: 14px;
      color: #222;
      margin-bottom: 3px;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      z-index: 100;
      max-width: 80vw;
      text-align: center;
    }
    #error:not(:empty) { display: block; }
  </style>
</head>
<body>
  <div id="toolbar"></div>
  <div id="panels"></div>
  <div class="tooltip" id="tooltip"></div>
  <div id="error"></div>
  <script src="chart.js"></script>
</body>
</html>
