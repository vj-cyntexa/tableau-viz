<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waterfall Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api@v1.16.0/lib/tableau.extensions.1.latest.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar .toolbar-group { display: flex; align-items: center; gap: 4px; }

    #toolbar label {
      font-size: 11px;
      color: #555;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-right: 4px;
    }

    #toolbar button {
      font-size: 11px;
      padding: 3px 9px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #333;
      cursor: pointer;
    }

    #toolbar button.active {
      background: #4e79a7;
      color: #fff;
      border-color: #4e79a7;
    }

    #toolbar button:hover:not(.active) { background: #f0f0f0; }

    #toolbar .sep {
      width: 1px; height: 20px; background: #ddd; margin: 0 4px;
    }

    #chart {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      z-index: 100;
      max-width: 80vw;
      text-align: center;
    }
    #error:not(:empty) { display: block; }

    .bar-gain       { fill: #4e79a7; }
    .bar-loss       { fill: #e15759; }
    .bar-total      { fill: #59a14f; }
    .bar-gain-gr    { fill: #59a14f; }
    .bar-loss-gr    { fill: #e15759; }
    .bar-neutral    { fill: #76b7b2; }

    .connector { stroke: #aaa; stroke-width: 1; stroke-dasharray: none; fill: none; }

    .axis text { font-size: 11px; fill: #555; }
    .axis .domain { stroke: #ccc; }
    .axis .tick line { stroke: #ccc; }
    .grid line { stroke: #ebebeb; stroke-dasharray: 3 3; }
    .grid .domain { display: none; }
    .zero-line { stroke: #999; stroke-width: 1; }

    .bar-label {
      font-size: 11px;
      text-anchor: middle;
      pointer-events: none;
    }

    .running-total {
      font-size: 10px;
      fill: #666;
      text-anchor: middle;
      pointer-events: none;
    }

    .tooltip {
      position: absolute;
      background: rgba(255,255,255,0.96);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.10);
      max-width: 220px;
      z-index: 50;
    }
    .tooltip .tt-title { font-weight: 600; font-size: 13px; color: #222; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-group">
      <label>Colors</label>
      <button class="scheme-btn active" data-scheme="blue-red">Blue/Red</button>
      <button class="scheme-btn" data-scheme="green-red">Green/Red</button>
      <button class="scheme-btn" data-scheme="single">Single</button>
    </div>
    <div class="sep"></div>
    <div class="toolbar-group">
      <label>Connectors</label>
      <button id="btn-connectors" class="active">Show</button>
    </div>
    <div class="sep"></div>
    <div class="toolbar-group">
      <label>Running Total</label>
      <button id="btn-running-total" class="active">Show</button>
    </div>
  </div>
  <div id="chart"></div>
  <div id="error"></div>
  <script src="chart.js"></script>
  <script>
    document.querySelectorAll('.scheme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.WF_STATE.colorScheme = btn.dataset.scheme;
        window.WF_STATE.redraw();
      });
    });

    document.getElementById('btn-connectors').addEventListener('click', function () {
      window.WF_STATE.showConnectors = !window.WF_STATE.showConnectors;
      this.textContent = window.WF_STATE.showConnectors ? 'Show' : 'Hide';
      this.classList.toggle('active', window.WF_STATE.showConnectors);
      window.WF_STATE.redraw();
    });

    document.getElementById('btn-running-total').addEventListener('click', function () {
      window.WF_STATE.showRunningTotal = !window.WF_STATE.showRunningTotal;
      this.textContent = window.WF_STATE.showRunningTotal ? 'Show' : 'Hide';
      this.classList.toggle('active', window.WF_STATE.showRunningTotal);
      window.WF_STATE.redraw();
    });
  </script>
</body>
</html>
