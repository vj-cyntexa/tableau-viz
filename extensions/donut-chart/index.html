<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Donut Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://extensions.tableau.com/lib/tableau.extensions.2.latest.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Toggle bar ── */
    #controls {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    #controls span {
      font-size: 12px;
      color: #666;
      margin-right: 4px;
    }

    .mode-btn {
      padding: 4px 12px;
      font-size: 12px;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #444;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .mode-btn:hover {
      background: #eef2ff;
      border-color: #7b8cde;
      color: #2d3a8c;
    }

    .mode-btn.active {
      background: #4e5ba6;
      border-color: #4e5ba6;
      color: #fff;
    }

    /* ── Chart area ── */
    #chart {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ── Tooltip ── */
    .tooltip {
      position: absolute;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.10);
      max-width: 220px;
      z-index: 10;
      display: none;
    }

    .tooltip .tt-label {
      font-weight: 600;
      font-size: 13px;
      color: #222;
      margin-bottom: 3px;
    }

    .tooltip .tt-value { color: #333; }
    .tooltip .tt-pct   { color: #888; font-size: 11px; }

    /* ── Legend ── */
    .legend text {
      font-size: 12px;
      fill: #444;
    }

    /* ── Center label ── */
    .center-total {
      font-size: 22px;
      font-weight: 700;
      fill: #222;
      text-anchor: middle;
    }

    .center-sub {
      font-size: 11px;
      fill: #888;
      text-anchor: middle;
    }

    /* ── Error banner ── */
    #error {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      z-index: 100;
      max-width: 80vw;
      text-align: center;
    }
    #error:not(:empty) { display: block; }
  </style>
</head>
<body>
  <div id="controls">
    <span>Mode:</span>
    <button class="mode-btn active" data-mode="standard">Standard</button>
    <button class="mode-btn"        data-mode="exploded">Exploded</button>
    <button class="mode-btn"        data-mode="multi-ring">Multi-Ring</button>
  </div>
  <div id="chart"></div>
  <div class="tooltip" id="tooltip"></div>
  <div id="error"></div>
  <script src="chart.js"></script>
</body>
</html>
