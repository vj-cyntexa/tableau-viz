<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RFM Scatter Plot</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://extensions.tableau.com/lib/tableau.extensions.2.latest.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar .toolbar-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #toolbar label {
      font-size: 11px;
      color: #555;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    #toolbar button {
      font-size: 11px;
      padding: 3px 9px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #333;
      cursor: pointer;
    }

    #toolbar button.active {
      background: #4e79a7;
      color: #fff;
      border-color: #4e79a7;
    }

    #toolbar button:hover:not(.active) { background: #f0f0f0; }

    #toolbar input[type="number"] {
      width: 64px;
      font-size: 11px;
      padding: 3px 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    #toolbar input[type="range"] {
      width: 80px;
      cursor: pointer;
    }

    #toolbar .sep {
      width: 1px;
      height: 20px;
      background: #ddd;
      margin: 0 4px;
    }

    #chart {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      z-index: 100;
      max-width: 80vw;
      text-align: center;
    }
    #error:not(:empty) { display: block; }

    .quadrant-line { stroke: #aaa; stroke-dasharray: 5 4; stroke-width: 1; }
    .quadrant-label { font-size: 10px; fill: #aaa; font-style: italic; }
    .bubble { stroke: #fff; stroke-width: 1; opacity: 0.8; cursor: pointer; transition: opacity 0.15s; }
    .bubble:hover { opacity: 1; stroke-width: 2; }

    .axis text { font-size: 11px; fill: #555; }
    .axis .domain { stroke: #ccc; }
    .axis .tick line { stroke: #ccc; }
    .grid line { stroke: #ebebeb; stroke-dasharray: 3 3; }
    .grid .domain { display: none; }

    .legend text { font-size: 11px; fill: #444; }

    .tooltip {
      position: absolute;
      background: rgba(255,255,255,0.96);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.10);
      max-width: 240px;
      z-index: 50;
    }
    .tooltip .tt-title { font-weight: 600; font-size: 13px; color: #222; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-group">
      <label>Quadrant Lines</label>
      <button id="btn-quadrant" class="active">On</button>
    </div>
    <div class="sep"></div>
    <div class="toolbar-group">
      <label>Recency threshold</label>
      <input type="number" id="input-rec-threshold" placeholder="auto" min="1" max="999">
    </div>
    <div class="toolbar-group">
      <label>Frequency threshold</label>
      <input type="number" id="input-freq-threshold" placeholder="auto" min="1" max="999">
    </div>
    <div class="sep"></div>
    <div class="toolbar-group">
      <label>Bubble size</label>
      <input type="range" id="slider-size" min="4" max="40" value="28">
    </div>
    <div class="sep"></div>
    <div class="toolbar-group">
      <label>X Axis (Recency)</label>
      <button class="xdir-btn active" data-dir="recent-right">Recent = Right</button>
      <button class="xdir-btn" data-dir="recent-left">Recent = Left</button>
    </div>
  </div>
  <div id="chart"></div>
  <div id="error"></div>
  <script src="chart.js"></script>
  <script>
    document.getElementById('btn-quadrant').addEventListener('click', function () {
      window.RFM_STATE.showQuadrants = !window.RFM_STATE.showQuadrants;
      this.textContent = window.RFM_STATE.showQuadrants ? 'On' : 'Off';
      this.classList.toggle('active', window.RFM_STATE.showQuadrants);
      window.RFM_STATE.redraw();
    });

    document.getElementById('input-rec-threshold').addEventListener('change', function () {
      window.RFM_STATE.recThreshold = this.value === '' ? null : Number(this.value);
      window.RFM_STATE.redraw();
    });

    document.getElementById('input-freq-threshold').addEventListener('change', function () {
      window.RFM_STATE.freqThreshold = this.value === '' ? null : Number(this.value);
      window.RFM_STATE.redraw();
    });

    document.getElementById('slider-size').addEventListener('input', function () {
      window.RFM_STATE.maxRadius = Number(this.value);
      window.RFM_STATE.redraw();
    });

    document.querySelectorAll('.xdir-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.xdir-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.RFM_STATE.recentRight = btn.dataset.dir === 'recent-right';
        window.RFM_STATE.redraw();
      });
    });
  </script>
</body>
</html>
