<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Treemap</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api@v1.16.0/lib/tableau.extensions.1.latest.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar .toolbar-group { display: flex; align-items: center; gap: 4px; }

    #toolbar label {
      font-size: 11px;
      color: #555;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-right: 4px;
    }

    #toolbar button {
      font-size: 11px;
      padding: 3px 9px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #333;
      cursor: pointer;
    }

    #toolbar button.active {
      background: #4e79a7;
      color: #fff;
      border-color: #4e79a7;
    }

    #toolbar button:hover:not(.active) { background: #f0f0f0; }

    #toolbar .sep {
      width: 1px;
      height: 20px;
      background: #ddd;
      margin: 0 4px;
    }

    #chart {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      z-index: 100;
      max-width: 80vw;
      text-align: center;
    }
    #error:not(:empty) { display: block; }

    .node { cursor: default; }
    .node-rect { stroke: #fff; stroke-width: 2; }
    .node-label {
      font-size: 11px;
      fill: #fff;
      pointer-events: none;
      dominant-baseline: middle;
    }
    .parent-label {
      font-size: 12px;
      font-weight: 600;
      fill: rgba(0,0,0,0.55);
      pointer-events: none;
    }

    .tooltip {
      position: absolute;
      background: rgba(255,255,255,0.96);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.10);
      max-width: 240px;
      z-index: 50;
    }
    .tooltip .tt-title { font-weight: 600; font-size: 13px; color: #222; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-group">
      <label>Tiling</label>
      <button class="tile-btn active" data-tile="squarify">Squarify</button>
      <button class="tile-btn" data-tile="slice">Slice</button>
      <button class="tile-btn" data-tile="dice">Dice</button>
      <button class="tile-btn" data-tile="sliceDice">SliceDice</button>
    </div>
    <div class="sep"></div>
    <div class="toolbar-group">
      <label>Color</label>
      <button class="color-btn active" data-color="category">By Category</button>
      <button class="color-btn" data-color="value">By Value</button>
    </div>
    <div class="sep"></div>
    <div class="toolbar-group">
      <label>Parent Labels</label>
      <button id="btn-parent-labels" class="active">Show</button>
    </div>
  </div>
  <div id="chart"></div>
  <div id="error"></div>
  <script src="chart.js"></script>
  <script>
    document.querySelectorAll('.tile-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tile-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.TREEMAP_STATE.tiling = btn.dataset.tile;
        window.TREEMAP_STATE.redraw();
      });
    });

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.TREEMAP_STATE.colorMode = btn.dataset.color;
        window.TREEMAP_STATE.redraw();
      });
    });

    document.getElementById('btn-parent-labels').addEventListener('click', function () {
      window.TREEMAP_STATE.showParentLabels = !window.TREEMAP_STATE.showParentLabels;
      this.textContent = window.TREEMAP_STATE.showParentLabels ? 'Show' : 'Hide';
      this.classList.toggle('active', window.TREEMAP_STATE.showParentLabels);
      window.TREEMAP_STATE.redraw();
    });
  </script>
</body>
</html>
