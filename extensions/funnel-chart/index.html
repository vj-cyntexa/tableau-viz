<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Funnel Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api@v1.16.0/lib/tableau.extensions.1.latest.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar label { font-size: 12px; color: #555; font-weight: 500; }
    .btn-group { display: flex; gap: 2px; }
    .btn {
      padding: 4px 10px; font-size: 12px;
      border: 1px solid #ccc; background: #fff;
      cursor: pointer; border-radius: 3px; color: #333;
      transition: background 0.15s;
    }
    .btn:hover { background: #f0f0f0; }
    .btn.active { background: #4a90d9; color: #fff; border-color: #3278b8; }
    .separator { width: 1px; height: 20px; background: #ddd; }

    #chart {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      background: #fff0f0; color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px; padding: 8px 16px;
      font-size: 13px; z-index: 100;
      max-width: 80vw; text-align: center;
    }
    #error:not(:empty) { display: block; }

    .tooltip {
      position: fixed;
      background: rgba(255,255,255,0.97);
      border: 1px solid #ddd; border-radius: 6px;
      padding: 8px 12px; font-size: 12px; line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      max-width: 240px; z-index: 50;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>Orientation:</label>
    <div class="btn-group">
      <button class="btn active" data-orient="vertical" onclick="setOrient(this)">Vertical</button>
      <button class="btn" data-orient="horizontal" onclick="setOrient(this)">Horizontal</button>
    </div>
    <div class="separator"></div>
    <label>% of:</label>
    <div class="btn-group">
      <button class="btn active" data-pct="first" onclick="setPct(this)">First stage</button>
      <button class="btn" data-pct="previous" onclick="setPct(this)">Previous stage</button>
    </div>
    <div class="separator"></div>
    <label>Labels:</label>
    <div class="btn-group">
      <button class="btn active" data-labels="inside" onclick="setLabels(this)">Inside</button>
      <button class="btn" data-labels="outside" onclick="setLabels(this)">Outside</button>
    </div>
  </div>
  <div id="chart"></div>
  <div id="error"></div>
  <script src="chart.js"></script>
</body>
</html>
