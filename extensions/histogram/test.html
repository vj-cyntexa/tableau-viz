<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Histogram — Browser Test</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      padding: 16px;
    }
    h2 {
      font-size: 14px;
      color: #555;
      margin-bottom: 12px;
    }
    #chart-wrapper {
      width: 100%;
      height: calc(100vh - 60px);
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    #chart { width: 100%; height: 100%; position: relative; }
    #error { display: none; }
    #error:not(:empty) {
      display: block;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      z-index: 100;
      max-width: 80vw;
      text-align: center;
    }
    /* Mirror toolbar styles from index.html */
    #toolbar {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 200;
      background: rgba(255,255,255,0.97);
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      font-size: 12px;
      min-width: 180px;
    }
    .tb-row { display: flex; align-items: center; gap: 8px; }
    .tb-label { color: #555; white-space: nowrap; flex-shrink: 0; }
    #bin-slider { flex: 1; cursor: pointer; accent-color: #4e79a7; }
    #bin-value-label { min-width: 24px; text-align: right; font-weight: 600; color: #222; }
    .btn-group { display: flex; gap: 2px; }
    .mode-btn {
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      color: #444;
      transition: background 0.12s, color 0.12s;
    }
    .mode-btn.active { background: #4e79a7; color: #fff; border-color: #4e79a7; }
    .toggle-check { cursor: pointer; accent-color: #4e79a7; }
    .grid line { stroke: #ebebeb; stroke-dasharray: 3 3; }
    .grid .domain { display: none; }
    .axis text { font-size: 11px; fill: #555; }
    .axis .domain { stroke: #ccc; }
    .axis .tick line { stroke: #ccc; }
    .tooltip {
      position: absolute;
      background: rgba(255,255,255,0.96);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.10);
      max-width: 220px;
      z-index: 400;
    }
    .legend text { font-size: 12px; fill: #444; }
  </style>
</head>
<body>
  <h2>Histogram — Browser Test (no Tableau required)</h2>

  <!-- Toolbar (must be in DOM before chart.js runs) -->
  <div id="toolbar">
    <div class="tb-row">
      <span class="tb-label">Bins:</span>
      <input type="range" id="bin-slider" min="5" max="50" value="10">
      <span id="bin-value-label">10</span>
    </div>
    <div class="tb-row">
      <span class="tb-label">Y axis:</span>
      <div class="btn-group">
        <button class="mode-btn active" data-ymode="count">Count</button>
        <button class="mode-btn" data-ymode="density">Density</button>
        <button class="mode-btn" data-ymode="percent">Percent</button>
      </div>
    </div>
    <div class="tb-row">
      <label class="tb-label" for="kde-toggle">KDE curve:</label>
      <input type="checkbox" id="kde-toggle" class="toggle-check">
    </div>
    <div class="tb-row">
      <label class="tb-label" for="log-toggle">Log X:</label>
      <input type="checkbox" id="log-toggle" class="toggle-check">
    </div>
  </div>

  <div id="chart-wrapper">
    <div id="chart"></div>
    <div id="error"></div>
  </div>

  <script>
  (function () {
    // ── 120 hardcoded CLV rows: Gold (30), Silver (50), Bronze (40) ───────────
    // Gold: mean $800, right-skewed
    // Silver: mean $400, right-skewed
    // Bronze: mean $150, right-skewed

    const RAW_DATA = [
      // Gold (30 rows)
      ['Gold', 234], ['Gold', 456], ['Gold', 789], ['Gold', 1023], ['Gold', 567],
      ['Gold', 890], ['Gold', 1234], ['Gold', 345], ['Gold', 678], ['Gold', 901],
      ['Gold', 1456], ['Gold', 2100], ['Gold', 312], ['Gold', 789], ['Gold', 456],
      ['Gold', 1678], ['Gold', 234], ['Gold', 567], ['Gold', 890], ['Gold', 1123],
      ['Gold', 345], ['Gold', 678], ['Gold', 2345], ['Gold', 456], ['Gold', 789],
      ['Gold', 1012], ['Gold', 234], ['Gold', 567], ['Gold', 890], ['Gold', 1234],
      // Silver (50 rows)
      ['Silver', 123], ['Silver', 234], ['Silver', 345], ['Silver', 456], ['Silver', 189],
      ['Silver', 267], ['Silver', 389], ['Silver', 478], ['Silver', 156], ['Silver', 290],
      ['Silver', 378], ['Silver', 445], ['Silver', 167], ['Silver', 289], ['Silver', 356],
      ['Silver', 412], ['Silver', 145], ['Silver', 278], ['Silver', 345], ['Silver', 423],
      ['Silver', 134], ['Silver', 256], ['Silver', 334], ['Silver', 401], ['Silver', 123],
      ['Silver', 245], ['Silver', 312], ['Silver', 389], ['Silver', 112], ['Silver', 234],
      ['Silver', 301], ['Silver', 367], ['Silver', 145], ['Silver', 212], ['Silver', 289],
      ['Silver', 356], ['Silver', 134], ['Silver', 201], ['Silver', 267], ['Silver', 334],
      ['Silver', 123], ['Silver', 189], ['Silver', 256], ['Silver', 312], ['Silver', 112],
      ['Silver', 178], ['Silver', 245], ['Silver', 301], ['Silver', 167], ['Silver', 423],
      // Bronze (40 rows)
      ['Bronze', 45],  ['Bronze', 67],  ['Bronze', 89],  ['Bronze', 112], ['Bronze', 78],
      ['Bronze', 123], ['Bronze', 145], ['Bronze', 56],  ['Bronze', 89],  ['Bronze', 134],
      ['Bronze', 156], ['Bronze', 67],  ['Bronze', 89],  ['Bronze', 112], ['Bronze', 78],
      ['Bronze', 134], ['Bronze', 45],  ['Bronze', 89],  ['Bronze', 112], ['Bronze', 145],
      ['Bronze', 67],  ['Bronze', 89],  ['Bronze', 112], ['Bronze', 78],  ['Bronze', 45],
      ['Bronze', 67],  ['Bronze', 134], ['Bronze', 89],  ['Bronze', 112], ['Bronze', 56],
      ['Bronze', 89],  ['Bronze', 145], ['Bronze', 67],  ['Bronze', 89],  ['Bronze', 78],
      ['Bronze', 112], ['Bronze', 45],  ['Bronze', 89],  ['Bronze', 67],  ['Bronze', 134],
    ];

    const columns = [
      { fieldName: 'Segment', index: 0, dataType: 'string' },
      { fieldName: 'CLV',     index: 1, dataType: 'float'  },
    ];

    const data = RAW_DATA.map(([seg, clv]) => [
      { value: seg       },
      { value: String(clv) },
    ]);

    const dataTable = { columns, data };

    const vizSpec = {
      marksSpecificationCollection: [{
        encodingCollection: [
          { id: 'segment',   fieldCollection: [{ fieldName: 'Segment' }] },
          { id: 'value',     fieldCollection: [{ fieldName: 'CLV'     }] },
          // No bin_count encoding — let Sturges / slider control
        ],
      }],
    };

    window.tableau = {
      TableauEventType: { SummaryDataChanged: 'summary-data-changed' },
      extensions: {
        initializeAsync() { return Promise.resolve(); },
        worksheetContent: {
          worksheet: {
            addEventListener() {},
            getVisualSpecificationAsync() { return Promise.resolve(vizSpec); },
            getSummaryDataReaderAsync() {
              return Promise.resolve({
                getAllPagesAsync() { return Promise.resolve(dataTable); },
                releaseAsync()    { return Promise.resolve(); },
              });
            },
          },
        },
      },
    };
  })();
  </script>

  <!-- chart.js must load after window.tableau is defined -->
  <script src="chart.js"></script>
</body>
</html>
