<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bubble Chart — Browser Test</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      padding: 16px;
    }
    h2 { font-size: 14px; color: #333; margin-bottom: 10px; }
    #chart-wrapper {
      width: 100%;
      height: calc(100vh - 80px);
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }
    #chart { width: 100%; height: 100%; position: relative; }
    .tooltip {
      position: absolute;
      background: rgba(255,255,255,0.96);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.10);
      max-width: 220px;
      display: none;
    }
    .tooltip .tt-title { font-weight: 600; font-size: 13px; color: #222; margin-bottom: 4px; }
    #error { display: none; background: #fff0f0; color: #c0392b; padding: 8px 16px; border-radius: 6px; margin-bottom: 8px; }
    #error:not(:empty) { display: block; }
    #toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 6px 12px; background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0; font-size: 12px; flex-wrap: wrap;
    }
    #toolbar label { color: #555; white-space: nowrap; }
    #toolbar input[type="number"] { width: 52px; padding: 2px 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; }
    #toolbar input[type="text"] { width: 110px; padding: 2px 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; }
    #toolbar .sep { width: 1px; height: 18px; background: #ddd; }
    .toggle-btn { padding: 3px 9px; border: 1px solid #ccc; border-radius: 3px; background: #fff; font-size: 11px; cursor: pointer; color: #444; }
    .toggle-btn.active { background: #4e79a7; color: #fff; border-color: #4e79a7; }
  </style>
</head>
<body>
  <h2>Bubble Chart — Browser Test (Mock Data: 8 Loyalty Segments)</h2>
  <div id="chart-wrapper">
    <div id="toolbar">
      <label>Size min: <input type="number" id="sizeMin" value="6" min="2" max="30"></label>
      <label>max: <input type="number" id="sizeMax" value="40" min="10" max="80"></label>
      <div class="sep"></div>
      <button class="toggle-btn active" id="btnLabels">Labels</button>
      <button class="toggle-btn active" id="btnQuadrants">Quadrants</button>
      <div class="sep"></div>
      <label>X label: <input type="text" id="xLabel" value="Avg Order Value ($)"></label>
      <label>Y label: <input type="text" id="yLabel" value="Purchase Frequency (yr)"></label>
    </div>
    <div id="chart"></div>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <div id="error"></div>

  <script>
    // ─── Mock Tableau API ─────────────────────────────────────────────────────
    // Columns: x=Avg Order Value, y=Purchase Frequency, size=Customer Count,
    //          color=Segment, label=Segment
    const MOCK_COLUMNS = [
      { fieldName: 'Avg Order Value', index: 0 },
      { fieldName: 'Purchase Frequency', index: 1 },
      { fieldName: 'Customer Count', index: 2 },
      { fieldName: 'Segment', index: 3 },
    ];

    // 8 RFM loyalty segments
    const MOCK_DATA = [
      // [Avg Order Value, Purchase Frequency, Customer Count, Segment]
      [320, 18, 4200,  'Champions'],
      [210, 12, 6800,  'Loyal Customers'],
      [145, 7,  9500,  'Potential Loyalists'],
      [90,  3,  12000, 'New Customers'],
      [280, 5,  3100,  'At Risk'],
      [380, 9,  1800,  'Can\'t Lose Them'],
      [75,  2,  7200,  'Hibernating'],
      [60,  1,  5400,  'Lost'],
    ].map(r => r.map(v => ({ value: v })));

    const MOCK_ENCODINGS = [
      { id: 'x',     fieldCollection: [{ fieldName: 'Avg Order Value' }] },
      { id: 'y',     fieldCollection: [{ fieldName: 'Purchase Frequency' }] },
      { id: 'size',  fieldCollection: [{ fieldName: 'Customer Count' }] },
      { id: 'color', fieldCollection: [{ fieldName: 'Segment' }] },
      { id: 'label', fieldCollection: [{ fieldName: 'Segment' }] },
    ];

    window.tableau = {
      extensions: {
        initializeAsync() { return Promise.resolve(); },
        worksheetContent: {
          worksheet: {
            addEventListener() {},
            getVisualSpecificationAsync() {
              return Promise.resolve({
                marksSpecificationCollection: [{
                  encodingCollection: MOCK_ENCODINGS
                }]
              });
            },
            getSummaryDataReaderAsync() {
              return Promise.resolve({
                getAllPagesAsync() {
                  return Promise.resolve({ columns: MOCK_COLUMNS, data: MOCK_DATA });
                },
                releaseAsync() { return Promise.resolve(); }
              });
            }
          }
        }
      },
      TableauEventType: { SummaryDataChanged: 'SummaryDataChanged' }
    };
  </script>
  <script src="chart.js"></script>
</body>
</html>
