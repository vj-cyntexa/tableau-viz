<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CLV vs Churn Risk Quadrant — Browser Test</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      padding: 18px;
      height: 100vh;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    #shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: calc(100vh - 52px);
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 14px;
      background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar .toolbar-group { display: flex; align-items: center; gap: 5px; }

    #toolbar label {
      font-size: 11px;
      color: #555;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    #toolbar input[type="number"] {
      width: 72px;
      font-size: 11px;
      padding: 3px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      color: #333;
    }

    #toolbar input[type="checkbox"] {
      cursor: pointer;
      accent-color: #4e79a7;
      width: 14px;
      height: 14px;
    }

    #toolbar .sep { width: 1px; height: 22px; background: #ddd; margin: 0 2px; }

    #chart {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #error {
      display: none;
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 13px;
      z-index: 100;
      max-width: 84vw;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    #error:not(:empty) { display: block; }

    /* shared chart CSS (mirrors index.html) */
    .axis text { font-size: 11px; fill: #555; }
    .axis .domain { stroke: #ccc; }
    .axis .tick line { stroke: #ccc; }
    .grid line { stroke: #ebebeb; stroke-dasharray: 3 3; }
    .grid .domain { display: none; }
    .bubble {
      stroke: #fff; stroke-width: 1.5; opacity: 0.82;
      cursor: pointer; transition: opacity 0.12s, stroke-width 0.12s;
    }
    .bubble:hover { opacity: 1; stroke-width: 2.5; }
    .seg-label {
      font-size: 9px; font-weight: 600; fill: #fff;
      pointer-events: none; text-anchor: middle; dominant-baseline: middle;
    }
    .legend text { font-size: 11px; fill: #444; }
    .tooltip {
      position: absolute; background: rgba(255,255,255,0.97);
      border: 1px solid #ddd; border-radius: 7px; padding: 10px 14px;
      font-size: 12px; line-height: 1.75; pointer-events: none;
      box-shadow: 0 3px 12px rgba(0,0,0,0.11); max-width: 250px; z-index: 50;
    }
    .tooltip .tt-title { font-weight: 700; font-size: 13px; color: #222; margin-bottom: 5px; }
  </style>
</head>
<body>
  <h2>CLV vs Churn Risk Quadrant — Browser Test (no Tableau required)</h2>

  <div id="shell">
    <div id="toolbar">
      <div class="toolbar-group">
        <label for="clv-threshold">CLV Threshold</label>
        <input type="number" id="clv-threshold" step="100" value="700">
      </div>
      <div class="toolbar-group">
        <label for="churn-threshold">Churn Threshold</label>
        <input type="number" id="churn-threshold" step="0.05" min="0" max="1" value="0.5">
      </div>
      <div class="sep"></div>
      <div class="toolbar-group">
        <input type="checkbox" id="show-quad-labels" checked>
        <label for="show-quad-labels">Quadrant Labels</label>
      </div>
      <div class="toolbar-group">
        <input type="checkbox" id="show-seg-labels">
        <label for="show-seg-labels">Segment Labels</label>
      </div>
    </div>

    <div id="chart">
      <div id="error"></div>
    </div>
  </div>

  <script>
    // ── Mock Tableau API ──────────────────────────────────────────────────────

    // 9 customer segments with realistic CLV and churn risk values.
    // Columns: Segment, CLV, Churn Risk, Customer Count
    const MOCK_COLUMNS = [
      { fieldName: 'Segment',        index: 0 },
      { fieldName: 'CLV',            index: 1 },
      { fieldName: 'Churn Risk',     index: 2 },
      { fieldName: 'Customer Count', index: 3 },
    ];

    // | Segment              | CLV  | Churn Risk | Count |  Quadrant
    // |----------------------|------|------------|-------|------------------
    // | Champions            | 1850 | 0.08       | 2400  |  Protect & Grow
    // | Loyal Customers      | 1200 | 0.15       | 3800  |  Protect & Grow
    // | Potential Loyalists  | 620  | 0.22       | 5200  |  Nurture
    // | New Customers        | 280  | 0.35       | 4100  |  Nurture
    // | At-Risk VIPs         | 1650 | 0.72       | 890   |  Urgent Retention
    // | Can't Lose Them      | 980  | 0.81       | 640   |  Urgent Retention
    // | Hibernating          | 320  | 0.68       | 2100  |  Deprioritize
    // | Lost Causes          | 150  | 0.89       | 1200  |  Deprioritize
    // | Price Sensitive      | 410  | 0.55       | 3300  |  Deprioritize
    const MOCK_ROWS = [
      ['Champions',           1850, 0.08, 2400],
      ['Loyal Customers',     1200, 0.15, 3800],
      ['Potential Loyalists',  620, 0.22, 5200],
      ['New Customers',        280, 0.35, 4100],
      ['At-Risk VIPs',        1650, 0.72,  890],
      ["Can't Lose Them",      980, 0.81,  640],
      ['Hibernating',          320, 0.68, 2100],
      ['Lost Causes',          150, 0.89, 1200],
      ['Price Sensitive',      410, 0.55, 3300],
    ].map(r => r.map(v => ({ value: v })));

    const MOCK_VIZ_SPEC = {
      marksSpecificationCollection: [{
        encodingCollection: [
          { id: 'segment',    fieldCollection: [{ fieldName: 'Segment'        }] },
          { id: 'clv',        fieldCollection: [{ fieldName: 'CLV'            }] },
          { id: 'churn_risk', fieldCollection: [{ fieldName: 'Churn Risk'     }] },
          { id: 'size',       fieldCollection: [{ fieldName: 'Customer Count' }] },
        ],
      }],
    };

    window.tableau = {
      TableauEventType: { SummaryDataChanged: 'summary-data-changed' },
      extensions: {
        initializeAsync() { return Promise.resolve(); },
        worksheetContent: {
          worksheet: {
            addEventListener() {},
            getVisualSpecificationAsync() { return Promise.resolve(MOCK_VIZ_SPEC); },
            getSummaryDataReaderAsync() {
              return Promise.resolve({
                getAllPagesAsync() {
                  return Promise.resolve({ columns: MOCK_COLUMNS, data: MOCK_ROWS });
                },
                releaseAsync() { return Promise.resolve(); },
              });
            },
          },
        },
      },
    };
  </script>

  <!-- chart.js must come AFTER the mock tableau object -->
  <script src="chart.js"></script>

  <!-- Wire up toolbar controls (mirrors index.html inline script) -->
  <script>
    // Seed the CLV threshold input to the default median value
    window.CLV_STATE.clvThreshold = 700;
    window.CLV_STATE.churnThreshold = 0.5;

    document.getElementById('clv-threshold').addEventListener('input', function () {
      window.CLV_STATE.clvThreshold = this.value === '' ? null : Number(this.value);
      window.CLV_STATE.redraw();
    });

    document.getElementById('churn-threshold').addEventListener('input', function () {
      window.CLV_STATE.churnThreshold = this.value === '' ? 0.5 : Number(this.value);
      window.CLV_STATE.redraw();
    });

    document.getElementById('show-quad-labels').addEventListener('change', function () {
      window.CLV_STATE.showQuadLabels = this.checked;
      window.CLV_STATE.redraw();
    });

    document.getElementById('show-seg-labels').addEventListener('change', function () {
      window.CLV_STATE.showSegLabels = this.checked;
      window.CLV_STATE.redraw();
    });
  </script>
</body>
</html>
