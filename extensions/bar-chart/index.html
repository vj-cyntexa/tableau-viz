<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bar Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api@v1.16.0/lib/tableau.extensions.1.latest.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
      overflow: hidden;
    }

    #chart {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      z-index: 100;
      max-width: 80vw;
      text-align: center;
    }
    #error:not(:empty) { display: block; }

    #toolbar {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .btn-group {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #ccc;
    }
    .btn {
      padding: 5px 10px;
      font-size: 11px;
      border: none;
      background: #f5f5f5;
      cursor: pointer;
      color: #444;
    }
    .btn.active {
      background: #3498db;
      color: #fff;
    }
    .btn:hover:not(.active) { background: #e8e8e8; }

    .grid line {
      stroke: #ebebeb;
      stroke-dasharray: 3 3;
    }
    .grid .domain { display: none; }

    .axis text {
      font-size: 11px;
      fill: #555;
    }
    .axis .domain { stroke: #ccc; }
    .axis .tick line { stroke: #ccc; }

    .bar-rect {
      cursor: default;
    }

    .tooltip {
      position: absolute;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.10);
      max-width: 230px;
      z-index: 300;
    }
    .tooltip .tt-cat {
      font-weight: 600;
      font-size: 13px;
      color: #222;
      margin-bottom: 4px;
    }

    .legend text {
      font-size: 12px;
      fill: #444;
    }

    .avg-control {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      color: #444;
    }
    .avg-label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }
    #avg-color {
      width: 22px;
      height: 22px;
      border: none;
      padding: 0;
      cursor: pointer;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="btn-group" id="layout-group">
      <button class="btn active" data-layout="stacked">Stacked</button>
      <button class="btn" data-layout="grouped">Grouped</button>
      <button class="btn" data-layout="pct">100%</button>
    </div>
    <div class="btn-group" id="orient-group">
      <button class="btn active" data-orient="vertical">Vertical</button>
      <button class="btn" data-orient="horizontal">Horizontal</button>
    </div>
    <div class="avg-control">
      <label class="avg-label">
        <input type="checkbox" id="avg-toggle"> Avg line
      </label>
      <input type="color" id="avg-color" value="#e74c3c" title="Line color">
    </div>
  </div>
  <div id="chart"></div>
  <div id="error"></div>
  <script src="chart.js"></script>
</body>
</html>
