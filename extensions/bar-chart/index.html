<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bar Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://extensions.tableau.com/lib/tableau.extensions.2.latest.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
      overflow: hidden;
    }

    #chart {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      z-index: 100;
      max-width: 80vw;
      text-align: center;
    }
    #error:not(:empty) { display: block; }

    #toggle-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 200;
      background: #ffffff;
      border: 1.5px solid #4e79a7;
      color: #4e79a7;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.10);
      transition: background 0.15s, color 0.15s;
    }
    #toggle-btn:hover {
      background: #4e79a7;
      color: #ffffff;
    }

    .grid line {
      stroke: #ebebeb;
      stroke-dasharray: 3 3;
    }
    .grid .domain { display: none; }

    .axis text {
      font-size: 11px;
      fill: #555;
    }
    .axis .domain { stroke: #ccc; }
    .axis .tick line { stroke: #ccc; }

    .bar-rect {
      cursor: default;
    }

    .tooltip {
      position: absolute;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.10);
      max-width: 230px;
      z-index: 300;
    }
    .tooltip .tt-cat {
      font-weight: 600;
      font-size: 13px;
      color: #222;
      margin-bottom: 4px;
    }

    .legend text {
      font-size: 12px;
      fill: #444;
    }
  </style>
</head>
<body>
  <button id="toggle-btn">Switch to Grouped</button>
  <div id="chart"></div>
  <div id="error"></div>
  <script src="chart.js"></script>
</body>
</html>
