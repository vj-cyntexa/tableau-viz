<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bar Chart — Browser Test</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 16px;
    }
    h2 {
      font-size: 14px;
      color: #555;
      margin-bottom: 12px;
    }
    #chart-wrapper {
      width: 100%;
      height: calc(100vh - 60px);
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    #chart { width: 100%; height: 100%; position: relative; }
    #error { display: none; }
    #error:not(:empty) {
      display: block;
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
    }

    /* Toggle button */
    #toggle-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 200;
      background: #ffffff;
      border: 1.5px solid #4e79a7;
      color: #4e79a7;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.10);
      transition: background 0.15s, color 0.15s;
    }
    #toggle-btn:hover {
      background: #4e79a7;
      color: #ffffff;
    }

    /* Chart styles (mirrors index.html) */
    .grid line { stroke: #ebebeb; stroke-dasharray: 3 3; }
    .grid .domain { display: none; }
    .axis text { font-size: 11px; fill: #555; }
    .axis .domain { stroke: #ccc; }
    .axis .tick line { stroke: #ccc; }
    .bar-rect { cursor: default; }
    .tooltip {
      position: absolute;
      background: rgba(255,255,255,.96);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,.10);
      max-width: 230px;
      z-index: 300;
    }
    .tooltip .tt-cat { font-weight: 600; font-size: 13px; color: #222; margin-bottom: 4px; }
    .legend text { font-size: 12px; fill: #444; }
  </style>
</head>
<body>
  <h2>Bar Chart — Browser Test (no Tableau required)</h2>
  <button id="toggle-btn">Switch to Grouped</button>
  <div id="chart-wrapper">
    <div id="chart"></div>
    <div id="error"></div>
  </div>

  <script>
  // ─── Mock data: 3 x-categories × 4 color-groups (realistic sales data) ──────
  // x-categories: product categories
  // color-groups:  regions
  const CATEGORIES = ['Furniture', 'Technology', 'Office Supplies'];
  const REGIONS    = ['East', 'West', 'Central', 'South'];

  const SEED_VALUES = {
    'Furniture':       { 'East': 142000, 'West': 187000, 'Central': 95000,  'South': 113000 },
    'Technology':      { 'East': 231000, 'West': 268000, 'Central': 152000, 'South': 175000 },
    'Office Supplies': { 'East': 89000,  'West': 104000, 'Central': 71000,  'South': 83000  },
  };

  function generateMockRows() {
    const rows = [];
    CATEGORIES.forEach(cat => {
      REGIONS.forEach(region => {
        const base = SEED_VALUES[cat][region];
        const value = Math.round(base + (Math.random() - 0.5) * base * 0.12);
        rows.push([
          { value: cat    },
          { value: String(value) },
          { value: region },
        ]);
      });
    });
    return rows;
  }

  // ─── Mock Tableau Extensions API ──────────────────────────────────────────
  window.tableau = {
    TableauEventType: { SummaryDataChanged: 'summary-data-changed' },
    extensions: {
      initializeAsync: async () => {},
      worksheetContent: {
        worksheet: {
          addEventListener: () => {},
          getVisualSpecificationAsync: async () => ({
            marksSpecificationCollection: [{
              encodingCollection: [
                { id: 'x',     fieldCollection: [{ fieldName: 'Category' }] },
                { id: 'y',     fieldCollection: [{ fieldName: 'Sales'    }] },
                { id: 'color', fieldCollection: [{ fieldName: 'Region'   }] },
              ]
            }]
          }),
          getSummaryDataReaderAsync: async () => ({
            getAllPagesAsync: async () => ({
              columns: [
                { fieldName: 'Category', index: 0, dataType: 'string' },
                { fieldName: 'Sales',    index: 1, dataType: 'float'  },
                { fieldName: 'Region',   index: 2, dataType: 'string' },
              ],
              data: generateMockRows(),
            }),
            releaseAsync: async () => {},
          }),
        }
      }
    }
  };
  </script>

  <!-- Load chart logic after mock is defined -->
  <script src="chart.js"></script>
</body>
</html>
