<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bar-Line Combo Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://extensions.tableau.com/lib/tableau.extensions.2.latest.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
      overflow: hidden;
    }

    #chart {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      z-index: 100;
      max-width: 80vw;
      text-align: center;
    }
    #error:not(:empty) { display: block; }

    /* Grid */
    .grid line {
      stroke: #ebebeb;
      stroke-dasharray: 3 3;
    }
    .grid .domain { display: none; }

    /* Axes */
    .axis text {
      font-size: 11px;
      fill: #555;
    }
    .axis .domain { stroke: #ccc; }
    .axis .tick line { stroke: #ccc; }

    /* Right axis — style separately so color can differentiate */
    .axis-right text { fill: #e67e22; }
    .axis-right .domain { stroke: #e67e22; opacity: 0.5; }
    .axis-right .tick line { stroke: #e67e22; opacity: 0.4; }

    /* Bars */
    .bar {
      shape-rendering: crispEdges;
    }

    /* Line overlay */
    .combo-line {
      fill: none;
      stroke: #e67e22;
      stroke-width: 2.5px;
    }

    /* Crosshair */
    .crosshair {
      stroke: #999;
      stroke-width: 1px;
      stroke-dasharray: 4 3;
      pointer-events: none;
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.10);
      max-width: 240px;
    }
    .tooltip .tt-label {
      font-weight: 600;
      font-size: 13px;
      color: #222;
      margin-bottom: 4px;
    }

    /* Legend */
    .legend text {
      font-size: 12px;
      fill: #444;
    }
  </style>
</head>
<body>
  <div id="chart"></div>
  <div id="error"></div>
  <script src="chart.js"></script>
</body>
</html>
