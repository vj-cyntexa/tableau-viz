<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cohort Retention Heatmap — Browser Test</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    h2 { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 12px; }
    #chart-wrapper {
      width: 100%;
      height: calc(100vh - 80px);
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* Replicate index.html toolbar styles for toolbar in test */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #toolbar label { font-size: 12px; color: #555; font-weight: 500; }
    .btn-group { display: flex; gap: 2px; }
    .btn {
      padding: 4px 10px;
      font-size: 12px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      border-radius: 3px;
      color: #333;
    }
    .btn.active { background: #4a90d9; color: #fff; border-color: #3278b8; }
    .separator { width: 1px; height: 20px; background: #ddd; }
    #chart { flex: 1; position: relative; overflow: auto; }
    #error {
      display: none;
      position: fixed;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      background: #fff0f0; color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 6px; padding: 8px 16px;
      font-size: 13px; z-index: 100;
      max-width: 80vw; text-align: center;
    }
    #error:not(:empty) { display: block; }
    .cell-text {
      font-size: 11px; font-weight: 600;
      dominant-baseline: middle; text-anchor: middle;
      pointer-events: none;
    }
    .axis text { font-size: 11px; fill: #555; }
    .tooltip {
      position: fixed;
      background: rgba(255,255,255,0.97);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px; line-height: 1.7;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      max-width: 220px; z-index: 50;
    }
  </style>
</head>
<body>
  <h2>Cohort Retention Heatmap — Browser Test (no Tableau required)</h2>
  <div id="chart-wrapper">
    <div id="toolbar">
      <label>Color:</label>
      <div class="btn-group">
        <button class="btn active" data-scheme="Blues" onclick="setScheme(this)">Blues</button>
        <button class="btn" data-scheme="Greens" onclick="setScheme(this)">Greens</button>
        <button class="btn" data-scheme="Purples" onclick="setScheme(this)">Purples</button>
      </div>
      <div class="separator"></div>
      <label>
        <input type="checkbox" id="show-text-cb" checked onchange="toggleText(this)">
        <span>Show cell %</span>
      </label>
    </div>
    <div id="chart"></div>
    <div id="error"></div>
  </div>

  <script>
    // ── Mock data: 6 cohorts × 6 periods (Jan–Jun 2023) ──────────────────────
    (function () {
      const COHORTS = ['Jan 2023', 'Feb 2023', 'Mar 2023', 'Apr 2023', 'May 2023', 'Jun 2023'];
      const COHORT_SIZES = [4200, 3850, 5100, 4680, 3920, 4450];

      // Realistic retention curves: fast initial drop, slower later
      // base retention at each period per cohort (slight variation between cohorts)
      const BASE_CURVES = [
        [1.00, 0.58, 0.42, 0.33, 0.27, 0.22],  // Jan — decent retainer
        [1.00, 0.52, 0.37, 0.28, 0.22, 0.18],  // Feb
        [1.00, 0.61, 0.45, 0.36, 0.30, 0.25],  // Mar — best cohort
        [1.00, 0.49, 0.34, 0.26, 0.21, 0.17],  // Apr — slightly weaker
        [1.00, 0.55, 0.39, 0.31, 0.25, 0.21],  // May
        [1.00, 0.53, 0.38, 0.29, 0.23, 0.19],  // Jun
      ];

      const columns = [
        { fieldName: 'Acquisition Cohort', index: 0 },
        { fieldName: 'Period',             index: 1 },
        { fieldName: 'Retention Rate',     index: 2 },
        { fieldName: 'Cohort Size',        index: 3 },
      ];

      const rows = [];
      COHORTS.forEach((cohort, ci) => {
        BASE_CURVES[ci].forEach((rate, period) => {
          rows.push([
            { value: cohort },
            { value: String(period) },
            { value: String(rate) },
            { value: String(COHORT_SIZES[ci]) },
          ]);
        });
      });

      const dataTable = { columns, data: rows };

      const vizSpec = {
        marksSpecificationCollection: [{
          encodingCollection: [
            { id: 'cohort',      fieldCollection: [{ fieldName: 'Acquisition Cohort' }] },
            { id: 'period',      fieldCollection: [{ fieldName: 'Period'             }] },
            { id: 'retention',   fieldCollection: [{ fieldName: 'Retention Rate'     }] },
            { id: 'cohort_size', fieldCollection: [{ fieldName: 'Cohort Size'        }] },
          ],
        }],
      };

      window.tableau = {
        TableauEventType: { SummaryDataChanged: 'summary-data-changed' },
        extensions: {
          initializeAsync() { return Promise.resolve(); },
          worksheetContent: {
            worksheet: {
              addEventListener() {},
              getVisualSpecificationAsync() { return Promise.resolve(vizSpec); },
              getSummaryDataReaderAsync() {
                return Promise.resolve({
                  getAllPagesAsync() { return Promise.resolve(dataTable); },
                  releaseAsync()     { return Promise.resolve(); },
                });
              },
            },
          },
        },
      };
    })();
  </script>
  <script src="chart.js"></script>
</body>
</html>
